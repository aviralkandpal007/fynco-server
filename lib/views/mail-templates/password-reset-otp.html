<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your password</title>
    <style>
      body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; color: #1f1f1f; }
      .wrapper { padding: 32px; }
      .card { background: #ffffff; border-radius: 18px; padding: 32px; box-shadow: 0 18px 40px rgba(0,0,0,0.08); }
      h1 { margin: 18px 0 12px; font-size: 28px; }
      p { line-height: 1.6; color: #4b4b4b; margin: 0 0 12px; }
      .otp-box { display: inline-block; margin-top: 12px; padding: 14px 20px; border-radius: 12px; background: #f7f7f7; font-size: 24px; font-weight: 700; letter-spacing: 6px; }
      .sender-row { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
      .sender-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
      .sender-text { font-size: 13px; color: #6b6b6b; }
      .muted { font-size: 12px; color: #7a7a7a; margin-top: 18px; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <h1>{{title}}</h1>
        <p>{{greeting}}</p>
        <p>{{body}}</p>
        <div class="otp-box">{{otp}}</div>
        <div class="sender-row">
          <img class="sender-avatar" src="{{senderImageUrl}}" alt="Sender" />
          <div class="sender-text">{{senderText}}</div>
        </div>
        <p class="muted">{{footerNote}}</p>
      </div>
    </div>
  </body>
</html>
