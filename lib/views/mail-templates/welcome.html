<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Welcome to Fynco</title>
    <style>
      body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f6f4f1; color: #1f1f1f; }
      .wrapper { padding: 32px; }
      .card { background: #ffffff; border-radius: 16px; padding: 32px; box-shadow: 0 18px 40px rgba(0,0,0,0.08); }
      .brand { text-transform: uppercase; letter-spacing: 0.2em; font-size: 12px; color: #6d6a67; }
      h1 { margin: 16px 0 12px; font-size: 28px; }
      p { line-height: 1.6; color: #4b4b4b; }
      .cta { display: inline-block; margin-top: 24px; padding: 12px 18px; background: #f2a365; color: #ffffff; text-decoration: none; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="brand">Fynco</div>
        <h1>Welcome aboard</h1>
        <p>We are excited to have you. Start exploring budgets, set goals, and grow your financial confidence.</p>
        <a class="cta" href="{{ctaUrl}}">Get started</a>
      </div>
    </div>
  </body>
</html>
