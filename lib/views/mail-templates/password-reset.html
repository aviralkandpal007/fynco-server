<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your password</title>
    <style>
      body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; }
      .wrapper { padding: 32px; }
      .card { background: #111827; border-radius: 16px; padding: 32px; box-shadow: 0 18px 40px rgba(0,0,0,0.35); }
      .brand { text-transform: uppercase; letter-spacing: 0.2em; font-size: 12px; color: #94a3b8; }
      h1 { margin: 16px 0 12px; font-size: 26px; }
      p { line-height: 1.6; color: #cbd5f5; }
      .cta { display: inline-block; margin-top: 24px; padding: 12px 18px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 10px; }
      .code { margin-top: 16px; font-size: 18px; letter-spacing: 0.2em; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="brand">Fynco</div>
        <h1>Reset your password</h1>
        <p>Use the link below to reset your password. If you did not request this, you can ignore this email.</p>
        <a class="cta" href="{{resetUrl}}">Reset password</a>
        <div class="code">{{resetCode}}</div>
      </div>
    </div>
  </body>
</html>
